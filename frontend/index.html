<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bolão Copa 2026</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700&display=swap');
:root{--verde:#00843D;--amarelo:#FFDF00;--ouro:#C8A951;--escuro:#0A1628;--medio:#162540;--branco:#FFFFFF;--vermelho:#E63946;--cinza:#8898AA;}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Inter',sans-serif;background:var(--escuro);color:var(--branco);min-height:100vh;}
/* LOGIN */
#loginScreen{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px;}
.login-box{background:var(--medio);border:1px solid rgba(255,255,255,.1);border-radius:16px;padding:36px;width:100%;max-width:380px;text-align:center;}
.login-logo{font-size:56px;margin-bottom:8px;}
.login-titulo{font-family:'Bebas Neue',sans-serif;font-size:32px;color:var(--amarelo);letter-spacing:2px;}
.login-sub{font-size:12px;color:var(--cinza);letter-spacing:3px;text-transform:uppercase;margin-bottom:28px;}
.login-input{width:100%;padding:14px 16px;background:rgba(255,255,255,.06);border:2px solid rgba(255,255,255,.12);border-radius:10px;color:var(--branco);font-size:20px;font-weight:700;letter-spacing:4px;text-align:center;text-transform:uppercase;outline:none;transition:border-color .2s;margin-bottom:14px;}
.login-input:focus{border-color:var(--amarelo);}
.login-input::placeholder{letter-spacing:2px;font-size:14px;font-weight:400;}
.login-btn{width:100%;padding:14px;background:var(--verde);color:var(--branco);border:none;border-radius:10px;font-size:15px;font-weight:700;cursor:pointer;transition:all .2s;}
.login-btn:hover{background:#00a34c;transform:translateY(-1px);}
.login-erro{color:var(--vermelho);font-size:13px;margin-top:10px;display:none;}
/* APP */
#app{display:none;}
header{background:linear-gradient(135deg,var(--verde) 0%,var(--escuro) 60%);border-bottom:3px solid var(--amarelo);padding:14px 20px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;}
.logo{display:flex;align-items:center;gap:10px;}
.logo-icon{font-size:28px;}
.logo-text{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:2px;color:var(--amarelo);}
.logo-sub{font-size:10px;color:rgba(255,255,255,.5);letter-spacing:2px;}
.user-info{display:flex;align-items:center;gap:8px;}
.user-badge{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);border-radius:20px;padding:5px 12px;font-size:12px;font-weight:600;}
.sair-btn{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.15);border-radius:8px;padding:5px 10px;color:var(--cinza);font-size:11px;cursor:pointer;}
.tabs{display:flex;background:var(--medio);border-bottom:1px solid rgba(255,255,255,.07);overflow-x:auto;scrollbar-width:none;}
.tabs::-webkit-scrollbar{display:none;}
.tab{padding:13px 20px;font-size:11px;font-weight:600;letter-spacing:.5px;text-transform:uppercase;cursor:pointer;color:var(--cinza);border-bottom:3px solid transparent;transition:all .2s;white-space:nowrap;}
.tab:hover{color:var(--branco);}
.tab.active{color:var(--amarelo);border-bottom-color:var(--amarelo);}
.main{padding:16px;max-width:900px;margin:0 auto;}
.section{display:none;}.section.active{display:block;}
.card{background:var(--medio);border:1px solid rgba(255,255,255,.08);border-radius:12px;padding:18px;margin-bottom:12px;}
.card-title{font-family:'Bebas Neue',sans-serif;font-size:17px;letter-spacing:1px;color:var(--amarelo);margin-bottom:12px;}
.grupo-header{font-size:10px;color:var(--cinza);text-transform:uppercase;letter-spacing:2px;padding:4px 0 8px;border-bottom:1px solid rgba(255,255,255,.06);margin-bottom:8px;}
.jogo-card{background:linear-gradient(135deg,rgba(0,132,61,.1),rgba(10,22,40,.8));border:1px solid rgba(0,132,61,.2);border-radius:9px;padding:12px 14px;margin-bottom:7px;}
.jogo-card.bloqueado{opacity:.7;border-color:rgba(255,255,255,.08);}
.jogo-meta{font-size:10px;color:var(--cinza);text-transform:uppercase;letter-spacing:.7px;margin-bottom:9px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:4px;}
.jogo-times{display:flex;align-items:center;justify-content:space-between;gap:8px;}
.time{display:flex;flex-direction:column;align-items:center;gap:3px;flex:1;}
.flag{font-size:28px;line-height:1;}
.time-nome{font-weight:700;font-size:12px;text-align:center;}
.vs-area{text-align:center;flex-shrink:0;}
.placar-real{display:inline-flex;align-items:center;gap:5px;background:rgba(0,0,0,.3);border-radius:6px;padding:5px 10px;}
.placar-real-num{font-size:20px;font-weight:900;width:26px;text-align:center;color:var(--amarelo);}
.placar-sep-sm{font-size:14px;color:var(--cinza);}
.palpite-row{margin-top:8px;display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.btn{display:inline-flex;align-items:center;gap:4px;padding:7px 14px;border-radius:7px;font-size:12px;font-weight:600;cursor:pointer;border:none;transition:all .2s;}
.btn-verde{background:var(--verde);color:var(--branco);}
.btn-verde:hover{background:#00a34c;}
.btn-sm{padding:4px 10px;font-size:11px;}
.btn-disabled{background:rgba(255,255,255,.06);color:var(--cinza);cursor:not-allowed;}
.tag{display:inline-block;padding:1px 7px;border-radius:9px;font-size:10px;font-weight:600;}
.tag-aberto{background:rgba(0,132,61,.15);color:#4ade80;border:1px solid rgba(0,132,61,.3);}
.tag-bloq{background:rgba(255,255,255,.05);color:var(--cinza);border:1px solid rgba(255,255,255,.1);}
.pts-badge{display:inline-block;padding:1px 6px;border-radius:8px;font-size:10px;font-weight:700;}
.pts-exato{background:rgba(200,169,81,.2);color:var(--ouro);border:1px solid rgba(200,169,81,.4);}
.pts-venc{background:rgba(0,132,61,.2);color:#4ade80;border:1px solid rgba(0,132,61,.4);}
.pts-zero{background:rgba(255,255,255,.05);color:var(--cinza);}
.filter-bar{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px;overflow-x:auto;padding-bottom:4px;}
.filter-btn{padding:4px 12px;border-radius:20px;font-size:11px;font-weight:600;cursor:pointer;border:1px solid rgba(255,255,255,.12);background:transparent;color:var(--cinza);white-space:nowrap;transition:all .2s;}
.filter-btn.active{background:rgba(255,223,0,.12);color:var(--amarelo);border-color:rgba(255,223,0,.35);}
.ranking-item{display:flex;align-items:center;gap:12px;padding:10px 12px;border-radius:9px;margin-bottom:6px;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.06);}
.ranking-item.gold{border-color:rgba(200,169,81,.4);background:rgba(200,169,81,.07);}
.ranking-item.silver{border-color:rgba(192,192,192,.35);background:rgba(192,192,192,.05);}
.ranking-item.bronze{border-color:rgba(184,115,51,.35);background:rgba(184,115,51,.05);}
.ranking-item.eu{border:2px solid var(--amarelo)!important;}
.pos{font-family:'Bebas Neue',sans-serif;font-size:19px;width:26px;text-align:center;color:var(--cinza);}
.pos.gold{color:var(--ouro);}.pos.silver{color:#C0C0C0;}.pos.bronze{color:#B8733B;}
.avatar{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:700;flex-shrink:0;}
.av0{background:#e74c3c22;color:#e74c3c;}.av1{background:#3498db22;color:#3498db;}.av2{background:#9b59b622;color:#9b59b6;}
.av3{background:#2ecc7122;color:#2ecc71;}.av4{background:#f39c1222;color:#f39c12;}.av5{background:#1abc9c22;color:#1abc9c;}
.rk-nome{flex:1;font-weight:600;font-size:13px;}
.rk-pts{font-family:'Bebas Neue',sans-serif;font-size:20px;color:var(--amarelo);}
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:200;align-items:center;justify-content:center;padding:16px;}
.modal-overlay.open{display:flex;}
.modal{background:var(--medio);border:1px solid rgba(255,255,255,.12);border-radius:14px;padding:22px;width:100%;max-width:380px;}
.modal-title{font-family:'Bebas Neue',sans-serif;font-size:19px;color:var(--amarelo);margin-bottom:16px;}
.placar-input{width:46px;height:46px;background:rgba(255,255,255,.06);border:2px solid rgba(255,255,255,.15);border-radius:7px;color:var(--branco);font-size:22px;font-weight:700;text-align:center;outline:none;-moz-appearance:textfield;}
.placar-input::-webkit-inner-spin-button,.placar-input::-webkit-outer-spin-button{-webkit-appearance:none;}
.placar-input:focus{border-color:var(--amarelo);}
.toast{position:fixed;bottom:18px;right:18px;padding:10px 16px;border-radius:9px;font-weight:600;font-size:13px;z-index:999;transform:translateY(80px);opacity:0;transition:all .3s;}
.toast.show{transform:translateY(0);opacity:1;}
.toast.ok{background:var(--verde);color:white;}
.toast.err{background:var(--vermelho);color:white;}
.pts-info{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:14px;}
.pts-box{background:rgba(255,255,255,.04);border-radius:8px;padding:10px;text-align:center;border:1px solid rgba(255,255,255,.06);}
.pts-num{font-family:'Bebas Neue',sans-serif;font-size:26px;color:var(--amarelo);}
.pts-lbl{font-size:10px;color:var(--cinza);}
.empty{text-align:center;padding:40px 20px;color:var(--cinza);}
.spinner{text-align:center;padding:40px;color:var(--cinza);font-size:28px;}
@media(max-width:500px){.flag{font-size:22px;}.time-nome{font-size:11px;}}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="loginScreen">
  <div class="login-box">
    <div class="login-logo">⚽</div>
    <div class="login-titulo">Bolão Copa 2026</div>
    <div class="login-sub">EUA · México · Canadá</div>
    <input class="login-input" id="codigoInput" type="text" maxlength="10" placeholder="Seu código de acesso" autocomplete="off" onkeydown="if(event.key==='Enter')entrar()">
    <button class="login-btn" onclick="entrar()">Entrar no Bolão →</button>
    <div class="login-erro" id="loginErro">Código inválido. Peça ao administrador.</div>
  </div>
</div>

<!-- APP -->
<div id="app">
  <header>
    <div class="logo">
      <div class="logo-icon">⚽</div>
      <div>
        <div class="logo-text">Bolão Copa 2026</div>
        <div class="logo-sub">EUA · México · Canadá</div>
      </div>
    </div>
    <div class="user-info">
      <span class="user-badge" id="userBadge">—</span>
      <button class="sair-btn" onclick="sair()">Sair</button>
    </div>
  </header>

  <div class="tabs">
    <div class="tab active" data-tab="jogos" onclick="mudarTab(this)">🏟️ Jogos</div>
    <div class="tab" data-tab="palpites" onclick="mudarTab(this)">🎯 Meus Palpites</div>
    <div class="tab" data-tab="ranking" onclick="mudarTab(this)">🏆 Ranking</div>
  </div>

  <div class="main">
    <!-- JOGOS -->
    <div class="section active" id="sec-jogos">
      <div class="card">
        <div class="card-title">📋 Pontuação</div>
        <div class="pts-info">
          <div class="pts-box"><div class="pts-num">10</div><div class="pts-lbl">Placar Exato</div></div>
          <div class="pts-box"><div class="pts-num">5</div><div class="pts-lbl">Vencedor Certo</div></div>
          <div class="pts-box"><div class="pts-num">0</div><div class="pts-lbl">Errou</div></div>
        </div>
        <div style="font-size:11px;color:var(--cinza);">Palpites são travados automaticamente no horário de cada jogo.</div>
      </div>
      <div class="filter-bar" id="filterBar"></div>
      <div id="listaJogos"><div class="spinner">⏳</div></div>
    </div>

    <!-- MEUS PALPITES -->
    <div class="section" id="sec-palpites">
      <div id="meusPalpitesContent"><div class="spinner">⏳</div></div>
    </div>

    <!-- RANKING -->
    <div class="section" id="sec-ranking">
      <div id="rankingContent"><div class="spinner">⏳</div></div>
    </div>
  </div>
</div>

<!-- MODAL PALPITE -->
<div class="modal-overlay" id="modalPalpite">
  <div class="modal">
    <div class="modal-title" id="modalTitulo">Dar Palpite</div>
    <div id="modalBody"></div>
    <div style="display:flex;gap:8px;margin-top:16px;">
      <button class="btn btn-verde" style="flex:1;justify-content:center;" onclick="salvarPalpite()">Salvar ✓</button>
      <button class="btn" style="background:rgba(255,255,255,.08);flex:0.5;justify-content:center;" onclick="fecharModal()">Cancelar</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const API = '';
let token = localStorage.getItem('bolao_token');
let userId = localStorage.getItem('bolao_uid');
let userName = localStorage.getItem('bolao_name');
let jogos = [], palpites = {}, filtroAtivo = 'Todos';
let palpiteJogoId = null;

async function api(path, opts={}) {
  const headers = {'Content-Type':'application/json'};
  if(token) headers['Authorization'] = 'Bearer ' + token;
  const r = await fetch(API + path, {...opts, headers});
  const data = await r.json();
  if(!r.ok) throw new Error(data.error || 'Erro');
  return data;
}

async function entrar() {
  const codigo = document.getElementById('codigoInput').value.trim().toUpperCase();
  if(!codigo){return;}
  try {
    const data = await api('/api/login', {method:'POST', body: JSON.stringify({codigo})});
    token = data.token; userId = data.id; userName = data.nome;
    localStorage.setItem('bolao_token', token);
    localStorage.setItem('bolao_uid', userId);
    localStorage.setItem('bolao_name', userName);
    document.getElementById('loginErro').style.display = 'none';
    iniciarApp();
  } catch(e) {
    document.getElementById('loginErro').style.display = 'block';
  }
}

function sair() {
  localStorage.clear();
  location.reload();
}

async function iniciarApp() {
  document.getElementById('loginScreen').style.display = 'none';
  document.getElementById('app').style.display = 'block';
  document.getElementById('userBadge').textContent = '👤 ' + userName;
  await carregarDados();
}

async function carregarDados() {
  [jogos] = await Promise.all([api('/api/jogos')]);
  const pals = await api('/api/palpites');
  palpites = {};
  pals.forEach(p => palpites[p.jogo_id] = p);
  renderFilterBar();
  renderJogos();
}

const FASES_ORDER = ['Grupo A','Grupo B','Grupo C','Grupo D','Grupo E','Grupo F',
  'Grupo G','Grupo H','Grupo I','Grupo J','Grupo K','Grupo L',
  '16 Avos','Oitavas','Quartas','Semifinais','3º Lugar','Final'];

function renderFilterBar() {
  const fases = [...new Set(jogos.map(j=>j.fase))];
  const bar = document.getElementById('filterBar');
  bar.innerHTML = ['Todos',...fases].map(f =>
    `<button class="filter-btn ${f===filtroAtivo?'active':''}" onclick="setFiltro('${f}',this)">${f}</button>`
  ).join('');
}

function setFiltro(f, el) {
  filtroAtivo = f;
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  el.classList.add('active');
  renderJogos();
}

function renderJogos() {
  const lista = filtroAtivo === 'Todos' ? jogos : jogos.filter(j=>j.fase===filtroAtivo);
  const porFase = {};
  lista.forEach(j => { if(!porFase[j.fase]) porFase[j.fase]=[]; porFase[j.fase].push(j); });
  let html = '';
  FASES_ORDER.forEach(fase => {
    if(!porFase[fase]) return;
    html += `<div class="card" style="padding:12px 14px;"><div class="grupo-header">⚽ ${fase}</div>`;
    porFase[fase].forEach(j => { html += jogoHtml(j); });
    html += '</div>';
  });
  document.getElementById('listaJogos').innerHTML = html || '<div class="empty">Nenhum jogo encontrado.</div>';
}

function jogoHtml(j) {
  const p = palpites[j.id];
  const bloq = j.bloqueado;
  const tagHtml = bloq ? `<span class="tag tag-bloq">⏰ Encerrado</span>` : `<span class="tag tag-aberto">✅ Aberto</span>`;
  const btnHtml = bloq
    ? `<button class="btn btn-sm btn-disabled" disabled>${p?'🎯 '+p.gols1+'×'+p.gols2:'Sem palpite'}</button>`
    : `<button class="btn btn-verde btn-sm" onclick="abrirPalpite(${j.id})">${p?'✏️ Editar ('+p.gols1+'×'+p.gols2+')':'🎯 Palpitar'}</button>`;

  let pontosBadge = '';
  if(j.resultado && p) {
    const r = j.resultado;
    if(r.gols1===p.gols1 && r.gols2===p.gols2) pontosBadge = '<span class="pts-badge pts-exato">⭐ +10pts</span>';
    else {
      const rv = r.gols1>r.gols2?1:r.gols1<r.gols2?2:0;
      const pv = p.gols1>p.gols2?1:p.gols1<p.gols2?2:0;
      pontosBadge = rv===pv ? '<span class="pts-badge pts-venc">✅ +5pts</span>' : '<span class="pts-badge pts-zero">❌ 0pts</span>';
    }
  }

  const placarHtml = j.resultado
    ? `<div class="placar-real"><div class="placar-real-num">${j.resultado.gols1}</div><div class="placar-sep-sm">×</div><div class="placar-real-num">${j.resultado.gols2}</div></div>`
    : `<div style="font-size:11px;color:var(--cinza);">VS</div>`;

  const t1nome = j.resultado?.time1_nome || j.time1;
  const t2nome = j.resultado?.time2_nome || j.time2;
  const f1 = j.resultado?.time1_nome ? '🏳️' : j.flag1;
  const f2 = j.resultado?.time2_nome ? '🏳️' : j.flag2;

  return `<div class="jogo-card ${bloq?'bloqueado':''}">
    <div class="jogo-meta">
      <span>${j.data.split('-').reverse().join('/')} · ${j.hora} &nbsp; ${tagHtml}</span>
      ${btnHtml}
    </div>
    <div class="jogo-times">
      <div class="time"><div class="flag">${f1}</div><div class="time-nome">${t1nome}</div></div>
      <div class="vs-area">${placarHtml}${j.resultado?`<div style="font-size:9px;color:var(--cinza);margin-top:2px;text-align:center;">Oficial</div>`:''}</div>
      <div class="time"><div class="flag">${f2}</div><div class="time-nome">${t2nome}</div></div>
    </div>
    ${p ? `<div class="palpite-row"><span style="font-size:11px;color:var(--cinza);">Seu palpite: <strong style="color:white;">${p.gols1}×${p.gols2}</strong></span> ${pontosBadge}</div>` : ''}
  </div>`;
}

function abrirPalpite(jogoId) {
  const j = jogos.find(x=>x.id===jogoId);
  const p = palpites[jogoId];
  palpiteJogoId = jogoId;
  const t1 = j.resultado?.time1_nome || j.time1;
  const t2 = j.resultado?.time2_nome || j.time2;
  document.getElementById('modalTitulo').textContent = `${t1} × ${t2}`;
  document.getElementById('modalBody').innerHTML = `
    <div style="display:flex;align-items:center;justify-content:center;gap:14px;padding:16px 0;">
      <div class="time"><div class="flag">${j.flag1}</div><div class="time-nome">${t1}</div></div>
      <div style="display:flex;align-items:center;gap:6px;">
        <input type="number" class="placar-input" id="pg1" min="0" max="20" value="${p?p.gols1:0}">
        <span style="font-size:20px;color:var(--cinza);">×</span>
        <input type="number" class="placar-input" id="pg2" min="0" max="20" value="${p?p.gols2:0}">
      </div>
      <div class="time"><div class="flag">${j.flag2}</div><div class="time-nome">${t2}</div></div>
    </div>`;
  document.getElementById('modalPalpite').classList.add('open');
  setTimeout(()=>document.getElementById('pg1').select(),80);
}

async function salvarPalpite() {
  const g1 = parseInt(document.getElementById('pg1').value);
  const g2 = parseInt(document.getElementById('pg2').value);
  if(isNaN(g1)||isNaN(g2)||g1<0||g2<0){toast('Placar inválido!','err');return;}
  try {
    await api('/api/palpites', {method:'POST', body: JSON.stringify({jogo_id: palpiteJogoId, gols1:g1, gols2:g2})});
    palpites[palpiteJogoId] = {jogo_id: palpiteJogoId, gols1:g1, gols2:g2};
    fecharModal();
    renderJogos();
    toast('Palpite salvo! ⚽','ok');
  } catch(e) {
    toast(e.message,'err');
  }
}

function fecharModal() { document.getElementById('modalPalpite').classList.remove('open'); }

async function renderMeusPalpites() {
  const c = document.getElementById('meusPalpitesContent');
  await carregarDados();
  let totalPts = 0;
  const porFase = {};
  jogos.forEach(j => {
    if(!porFase[j.fase]) porFase[j.fase]=[];
    porFase[j.fase].push(j);
  });

  jogos.forEach(j => {
    const p = palpites[j.id];
    if(j.resultado && p) {
      const r = j.resultado;
      if(r.gols1===p.gols1&&r.gols2===p.gols2) totalPts+=10;
      else {
        const rv=r.gols1>r.gols2?1:r.gols1<r.gols2?2:0;
        const pv=p.gols1>p.gols2?1:p.gols1<p.gols2?2:0;
        if(rv===pv) totalPts+=5;
      }
    }
  });

  const comPalpite = jogos.filter(j=>palpites[j.id]).length;
  let html = `<div class="card"><div style="display:flex;justify-content:space-between;align-items:center;">
    <div><div class="card-title">🎯 Meus Palpites</div><div style="font-size:12px;color:var(--cinza);">${comPalpite}/${jogos.length} jogos</div></div>
    <div style="text-align:right;"><div style="font-family:'Bebas Neue',sans-serif;font-size:34px;color:var(--amarelo);line-height:1;">${totalPts}</div><div style="font-size:10px;color:var(--cinza);">pontos</div></div>
  </div></div>`;

  FASES_ORDER.forEach(fase => {
    if(!porFase[fase]) return;
    html += `<div class="card" style="padding:12px 14px;"><div class="grupo-header">⚽ ${fase}</div>`;
    porFase[fase].forEach(j => {
      const p = palpites[j.id];
      let ptsHtml='';
      if(j.resultado && p) {
        const r=j.resultado;
        const exact=r.gols1===p.gols1&&r.gols2===p.gols2;
        const rv=r.gols1>r.gols2?1:r.gols1<r.gols2?2:0, pv=p.gols1>p.gols2?1:p.gols1<p.gols2?2:0;
        ptsHtml = exact?'<span class="pts-badge pts-exato">⭐+10</span>':rv===pv?'<span class="pts-badge pts-venc">✅+5</span>':'<span class="pts-badge pts-zero">❌0</span>';
      }
      const t1 = j.resultado?.time1_nome || j.time1;
      const t2 = j.resultado?.time2_nome || j.time2;
      html += `<div class="jogo-card" style="${!p?'opacity:.4;':''}">
        <div class="jogo-meta">${j.data.split('-').reverse().join('/')} · ${j.hora}</div>
        <div style="display:flex;align-items:center;justify-content:space-between;gap:8px;">
          <div style="display:flex;align-items:center;gap:6px;flex:1;"><span style="font-size:20px;">${j.flag1}</span><span style="font-weight:700;font-size:12px;">${t1}</span></div>
          <div style="text-align:center;">
            ${p?`<div style="font-family:'Bebas Neue',sans-serif;font-size:20px;color:var(--amarelo);">${p.gols1}×${p.gols2}</div>`:'<div style="font-size:11px;color:var(--cinza);">—</div>'}
            ${ptsHtml}
          </div>
          <div style="display:flex;align-items:center;gap:6px;flex:1;justify-content:flex-end;"><span style="font-weight:700;font-size:12px;">${t2}</span><span style="font-size:20px;">${j.flag2}</span></div>
        </div>
        ${j.resultado?`<div style="font-size:10px;color:var(--cinza);margin-top:5px;">Oficial: ${j.resultado.gols1}×${j.resultado.gols2}</div>`:''}
      </div>`;
    });
    html += '</div>';
  });
  c.innerHTML = html;
}

async function renderRanking() {
  document.getElementById('rankingContent').innerHTML = '<div class="spinner">⏳</div>';
  const ranking = await api('/api/ranking');
  const enc = jogos.filter(j=>j.resultado).length;
  let html = `<div class="card" style="padding:10px 14px;margin-bottom:10px;"><div style="display:flex;justify-content:space-between;font-size:11px;color:var(--cinza);">
    <span>${ranking.length} participantes</span><span>${enc}/${jogos.length} jogos finalizados</span>
  </div></div>`;
  ranking.forEach((p,i) => {
    const pos=i+1,cls=pos===1?'gold':pos===2?'silver':pos===3?'bronze':'';
    const emoji=pos===1?'🥇':pos===2?'🥈':pos===3?'🥉':pos;
    const eu = p.id===userId ? ' eu' : '';
    html+=`<div class="ranking-item ${cls}${eu}">
      <div class="pos ${cls}">${emoji}</div>
      <div class="avatar av${i%6}">${p.nome[0]}</div>
      <div class="rk-nome">${p.nome}${p.id===userId?'<span style="font-size:9px;color:var(--amarelo);margin-left:5px;">você</span>':''}
        <div style="font-size:10px;color:var(--cinza);">${p.palpites} palpites · ${p.exatos} exatos · ${p.vencedores} venc.</div>
      </div>
      <div style="text-align:right;"><div class="rk-pts">${p.pontos}</div><div style="font-size:9px;color:var(--cinza);">pts</div></div>
    </div>`;
  });
  document.getElementById('rankingContent').innerHTML = html;
}

function mudarTab(el) {
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
  el.classList.add('active');
  const tab = el.dataset.tab;
  document.getElementById('sec-'+tab).classList.add('active');
  if(tab==='palpites') renderMeusPalpites();
  if(tab==='ranking') renderRanking();
}

function toast(msg, tipo) {
  const t = document.getElementById('toast');
  t.textContent=msg; t.className='toast '+(tipo==='err'?'err':'ok');
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2600);
}

document.getElementById('modalPalpite').addEventListener('click', function(e){if(e.target===this)fecharModal();});

// Auto-login se já tiver token
if(token && userName) {
  iniciarApp();
} else {
  document.getElementById('loginScreen').style.display = 'flex';
}
</script>
